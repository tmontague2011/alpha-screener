<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travis // Alpha Screener</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Courier New',monospace;background:#f7f7f5;color:#111;min-height:100vh}
  header{background:#111;color:#fff;padding:16px 20px}
  header .sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#888;margin-bottom:4px}
  header h1{font-size:18px;font-weight:700;letter-spacing:-0.5px}
  .tabs{display:flex;background:#fff;border-bottom:1px solid #e5e5e5}
  .tab{flex:1;padding:12px 8px;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:#888;border-bottom:3px solid transparent;font-family:inherit}
  .tab.active{color:#111;border-bottom-color:#111}
  .panel{display:none;padding:20px}.panel.active{display:block}
  .ctrl-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#888;margin-bottom:8px;font-weight:600}
  .section{margin-bottom:20px}
  .pills{display:flex;gap:7px;flex-wrap:wrap}
  .pill{padding:8px 14px;border-radius:5px;cursor:pointer;font-size:11px;font-family:'Courier New',monospace;font-weight:500;border:2px solid #ccc;background:#fff;color:#999;-webkit-tap-highlight-color:transparent}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
  @media(max-width:480px){.grid2{grid-template-columns:1fr}}
  .summary{font-size:11px;color:#555;padding:10px 14px;background:#fff;border-radius:6px;border:1px solid #e5e5e5;margin-bottom:16px;line-height:1.7;font-family:sans-serif}
  .scan-btn{width:100%;padding:14px;border:2px solid #111;background:#111;color:#fff;cursor:pointer;font-size:12px;letter-spacing:3px;text-transform:uppercase;font-family:inherit;border-radius:6px;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:8px}
  .scan-btn:disabled{opacity:0.4;cursor:not-allowed}
  .rcard{background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:14px 16px;margin-bottom:10px;cursor:pointer}
  .rcard.open{border-color:#1a7a42;background:#f9fdf9}
  .rhead{display:flex;justify-content:space-between;align-items:flex-start}
  .rticker{font-size:16px;font-weight:700;letter-spacing:1px}
  .rprice{font-size:12px;color:#1a7a42;font-weight:600;margin-left:8px}
  .rname{font-size:11px;color:#888;margin-top:3px;font-family:sans-serif}
  .rpri{font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:700;white-space:nowrap}
  .p1{color:#c0392b}.p2{color:#b7760a}.p3{color:#1a7a42}
  .rdetails{margin-top:12px;padding-top:12px;border-top:1px solid #eee}
  .rdetail{font-size:12px;color:#444;padding:4px 0 4px 12px;border-left:2px solid #e5e5e5;margin-bottom:5px;line-height:1.6;font-family:sans-serif}
  .conflict{font-size:10px;color:#8a5200;margin-top:6px;padding:4px 8px;background:#fff3e0;border-radius:3px}
  .dustin-row{display:flex;gap:8px;margin-bottom:16px}
  .dustin-in{flex:1;padding:11px 14px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#111;font-size:14px;font-family:inherit;text-transform:uppercase}
  .dustin-in::placeholder{color:#aaa;text-transform:none;font-size:13px}
  .vet-btn{padding:11px 18px;border:2px solid #111;border-radius:6px;background:#111;color:#fff;cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap}
  .vet-btn:disabled{opacity:0.4;cursor:not-allowed}
  .output{background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:16px;font-size:12px;color:#444;white-space:pre-wrap;line-height:1.8;font-family:sans-serif}
  .spinner{width:9px;height:9px;border-radius:50%;background:currentColor;display:inline-block;animation:pls 0.8s infinite}
  @keyframes pls{0%,100%{opacity:1}50%{opacity:0.2}}
  .footer{text-align:center;font-size:10px;color:#bbb;letter-spacing:1px;text-transform:uppercase;padding:24px 20px 32px}
  .tier-badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;margin-right:8px}
  .tier-1{background:#fdecea;color:#c0392b}
  .tier-2{background:#fff3e0;color:#b7760a}
  .tier-3{background:#e8f5ee;color:#1a7a42}
</style>
</head>
<body>

<header>
  <div class="sub">Travis Montague</div>
  <h1>Alpha Screener</h1>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('screener')">Screener</button>
  <button class="tab" onclick="showTab('signal')">Signal Check</button>
</div>

<div id="tab-screener" class="panel active">
  <div class="grid2">
    <div class="section">
      <div class="ctrl-label">Themes</div>
      <div class="pills" id="theme-pills"></div>
    </div>
    <div class="section">
      <div class="ctrl-label">Max Price</div>
      <div class="pills" id="price-pills"></div>
    </div>
  </div>
  <div class="grid2">
    <div class="section">
      <div class="ctrl-label">Market Cap</div>
      <div class="pills" id="cap-pills"></div>
    </div>
    <div class="section">
      <div class="ctrl-label">Catalyst</div>
      <div class="pills" id="cat-pills"></div>
    </div>
  </div>
  <div class="summary" id="sel-summary"></div>
  <button class="scan-btn" id="scan-btn" onclick="runScan()">▶ Run Scan</button>
  <div id="scan-results"></div>
</div>

<div id="tab-signal" class="panel">
  <p style="font-size:13px;color:#666;margin-bottom:16px;font-family:sans-serif;line-height:1.7">Enter any ticker — from Dustin, the screener, news, or your own research. Full vet: thesis, catalyst, entry, stop, target, portfolio fit, and a verdict.</p>
  <div class="dustin-row">
    <input class="dustin-in" id="vet-input" placeholder="Enter ticker e.g. TRT, AXTI..." maxlength="10"/>
    <button class="vet-btn" id="vet-btn" onclick="vetTicker()">Vet It</button>
  </div>
  <div id="vet-out"></div>
</div>

<div class="footer">Cross-check with Grok + Gemini before executing &nbsp;·&nbsp; Not financial advice</div>

<script>
const API_URL = 'https://alpha-screener-proxy.tmontague2011.workers.dev';

const PORTFOLIO = ['VOO','NVDA','CRWD','BBAI','SOUN','AEYE','RCAT','UMAC','SKYX'];

let themes = ['AI / Semiconductors', 'Defense / Drones'];
let maxPrice = 30;
let caps = ['micro', 'small'];
let cat = 'all';

const OFF = {background:'#ffffff',color:'#999999',border:'2px solid #cccccc',fontWeight:'500'};
const ON  = {background:'#e8f5ee',color:'#1a5a30',border:'2px solid #1a7a42',fontWeight:'700'};

function stylePill(el, on) {
  const s = on ? ON : OFF;
  el.style.background = s.background;
  el.style.color = s.color;
  el.style.border = s.border;
  el.style.fontWeight = s.fontWeight;
}
function makePill(label, val, on) {
  const b = document.createElement('button');
  b.className = 'pill';
  b.textContent = label;
  b.dataset.val = val;
  stylePill(b, on);
  return b;
}

// Theme pills — multi toggle
(function(){
  const items = [
    ['⚡ AI/Semis','AI / Semiconductors',true],
    ['🎯 Defense','Defense / Drones',true],
    ['🧬 Longevity','Longevity / Biotech',false],
    ['📱 Consumer AI','Consumer AI',false],
    ['⛽ Energy','Energy / Tankers',false],
  ];
  const wrap = document.getElementById('theme-pills');
  items.forEach(([label,val,on])=>{
    const b = makePill(label,val,on);
    b.addEventListener('click',function(){
      const isOn = themes.includes(val);
      if(isOn){themes=themes.filter(t=>t!==val);stylePill(b,false);}
      else{themes.push(val);stylePill(b,true);}
      sync();
    });
    wrap.appendChild(b);
  });
})();

// Price pills — single select
(function(){
  const items=[['$5','5'],['$10','10'],['$20','20'],['$30','30']];
  const wrap=document.getElementById('price-pills');
  const btns=[];
  items.forEach(([label,val])=>{
    const on=val==='30';
    const b=makePill(label,val,on);
    b.addEventListener('click',function(){
      maxPrice=parseInt(val);
      btns.forEach(x=>stylePill(x,false));
      stylePill(b,true);
      sync();
    });
    wrap.appendChild(b);
    btns.push(b);
  });
})();

// Cap pills — multi toggle
(function(){
  const items=[['Micro <$300M','micro',true],['Small $300M–$2B','small',true],['Mid $2B+','mid',false]];
  const wrap=document.getElementById('cap-pills');
  items.forEach(([label,val,on])=>{
    const b=makePill(label,val,on);
    b.addEventListener('click',function(){
      const isOn=caps.includes(val);
      if(isOn){caps=caps.filter(c=>c!==val);stylePill(b,false);}
      else{caps.push(val);stylePill(b,true);}
      sync();
    });
    wrap.appendChild(b);
  });
})();

// Cat pills — single select
(function(){
  const items=[['All Types','all',true],['Earnings','earnings',false],['Contracts','contract',false],['Volume','volume',false]];
  const wrap=document.getElementById('cat-pills');
  const btns=[];
  items.forEach(([label,val,on])=>{
    const b=makePill(label,val,on);
    b.addEventListener('click',function(){
      cat=val;
      btns.forEach(x=>stylePill(x,false));
      stylePill(b,true);
      sync();
    });
    wrap.appendChild(b);
    btns.push(b);
  });
})();

function capLabel(v){return v==='micro'?'Micro <$300M':v==='small'?'Small $300M–$2B':'Mid $2B+';}
function sync(){
  const t=themes.length?themes.join(', '):'(none)';
  const c=caps.length?caps.map(capLabel).join(', '):'(none)';
  const cl=cat==='all'?'All catalyst types':cat==='earnings'?'Earnings within 30d':cat==='contract'?'Contract wins':'Volume spikes';
  document.getElementById('sel-summary').innerHTML='<strong>Scanning:</strong> '+t+' &nbsp;·&nbsp; Under $'+maxPrice+' &nbsp;·&nbsp; '+c+' &nbsp;·&nbsp; '+cl;
}

// Parse results into structured cards
function parseResults(text){
  // Split on numbered items or ticker patterns
  const blocks = text.split(/\n(?=\d+\.\s+\*?\*?[A-Z]{2,5}|\*?\*?[A-Z]{2,5}\s*[-–—])/);
  const stocks = [];
  
  for(const block of blocks){
    if(!block.trim()) continue;
    // Try to extract ticker
    const tickerMatch = block.match(/\*?\*?([A-Z]{2,5})\*?\*?\s*[-–—:]/);
    if(!tickerMatch) continue;
    
    const ticker = tickerMatch[1];
    // Skip known non-tickers
    if(['THE','AND','FOR','NOT','ACT','NEW','ADD','BUY','SEC','FDA'].includes(ticker)) continue;
    
    const priceMatch = block.match(/\$[\d.]+/);
    const lines = block.split('\n').filter(l=>l.trim());
    const nameLine = lines[0] || '';
    const name = nameLine.replace(/^\d+\.\s*/,'').replace(/\*?\*?[A-Z]{2,5}\*?\*?\s*[-–—:]\s*/,'').replace(/\$[\d.]+.*/,'').trim().substring(0,60);
    
    const details = lines.slice(1).map(l=>l.replace(/^[-•*\d.]+\s*/,'').trim()).filter(l=>l.length>5);
    
    // Score for priority ranking
    let score = 0;
    const raw = block.toLowerCase();
    if(/volume|spike|surge|unusual|\d+x average/i.test(raw)) score += 4; // Volume anomaly = top signal
    if(/\d+\s*day|this\s*week|tomorrow|imminent/i.test(raw)) score += 3;
    if(/contract|award|order|dod|ndaa/i.test(raw)) score += 2;
    if(/earnings/i.test(raw)) score += 2;
    if(/upgrade|initiat|analyst/i.test(raw)) score += 1;
    if(/backlog/i.test(raw)) score += 1;
    
    stocks.push({ticker, name, price: priceMatch?priceMatch[0]:null, details, score, raw: block});
  }
  
  return stocks.filter(s=>s.ticker.length>=2).sort((a,b)=>b.score-a.score);
}

async function runScan(){
  if(!themes.length||!caps.length){alert('Select at least one theme and market cap.');return;}
  const btn=document.getElementById('scan-btn');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Scanning live markets...';
  document.getElementById('scan-results').innerHTML='';

  const capStr=caps.map(c=>c==='micro'?'Micro (<$300M)':c==='small'?'Small ($300M–$2B)':'Mid ($2B+)').join(', ');
  const catNote=cat==='earnings'?'upcoming earnings within 30 days':cat==='contract'?'recent contract wins or orders':cat==='volume'?'unusual volume spikes (2x+ 30-day average)':'all catalyst types';
  const today=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

  const prompt=`You are a stock screener for an active swing trader named Travis. Find exactly 5 specific, undiscovered stock ideas.

THEMES: ${themes.join(', ')}
PRICE: Under $${maxPrice} per share
MARKET CAP: ${capStr}
CATALYST FOCUS: ${catNote}
EXCHANGES: NYSE, Nasdaq, NYSE American (AMEX) — ALWAYS include AMEX
DO NOT SUGGEST (already owns): ${PORTFOLIO.join(', ')}

PRIORITY RANKING — rank results in this exact order:
1. VOLUME ANOMALY: stocks showing 2x+ their 30-day average volume with no obvious news yet = institutional positioning (highest priority signal)
2. HARD CATALYST within 14 days: DoD contract, earnings, FDA approval, partnership
3. HIGH BACKLOG-TO-MARKET-CAP: backlog value close to or exceeding market cap = undervalued
4. ANALYST INITIATION or upgrade in last 7 days

CRITICAL: Hunt for overlooked names like Trio-Tech (TRT) or AXT Inc (AXTI) — real revenue, specific catalyst, under $15 where $500 buys meaningful shares. NOT well-known names. AMEX micro-caps are priority.

Format EACH stock as:
[NUMBER]. TICKER - Company Name - $CurrentPrice
• Market cap tier and exchange
• Volume: [today's volume] vs [30-day avg] — [X]x average (FLAG if 2x+)
• Backlog-to-market-cap: [ratio if applicable]
• ONE specific catalyst with exact date and dollar amount
• 2-sentence thesis
• Entry: $X–$Y | Stop: $Z | Target: $T
• Risk: LOW / MEDIUM / HIGH
• Earnings: [date or N/A]
• Days to catalyst: [number]

Today: ${today}`;

  try{
    const res=await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1500,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await res.json();
    
    if(data.error){
      document.getElementById('scan-results').innerHTML=`<p style="color:#c0392b;font-size:13px;padding:12px 0">API Error: ${data.error.message}</p>`;
      btn.disabled=false;btn.innerHTML='▶ Run Scan';
      return;
    }
    
    const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');
    const stocks=parseResults(text);

    if(stocks.length>=2){
      document.getElementById('scan-results').innerHTML=stocks.map((s,i)=>{
        const tierLabel = i===0
          ? '<span class="tier-badge tier-1">▲ ACT FIRST</span>'
          : i===1
          ? '<span class="tier-badge tier-2">▲ ACT SOON</span>'
          : '<span class="tier-badge tier-3">◆ WATCH</span>';
        const conflict=PORTFOLIO.includes(s.ticker)?'<div class="conflict">⚠ Already in portfolio</div>':'';
        const hasVolume = /\d+x average|volume.*2x|unusual volume/i.test(s.raw);
        const volFlag = hasVolume ? '<span style="font-size:10px;color:#c0392b;margin-left:6px;font-weight:700">📈 VOL SPIKE</span>' : '';
        return `<div class="rcard" id="rc${i}" onclick="toggleCard(${i})">
          <div class="rhead">
            <div>
              <span class="rticker">${s.ticker}</span>${s.price?`<span class="rprice">${s.price}</span>`:''}${volFlag}
              <div class="rname">${s.name}</div>
            </div>
            ${tierLabel}
          </div>
          ${conflict}
          <div class="rdetails" id="rd${i}" style="display:none">
            ${s.details.map(d=>`<div class="rdetail">${d}</div>`).join('')}
          </div>
        </div>`;
      }).join('');
    } else {
      // Raw fallback
      document.getElementById('scan-results').innerHTML=`<div class="output">${text}</div>`;
    }
  }catch(e){
    document.getElementById('scan-results').innerHTML='<p style="color:#c0392b;font-size:13px;padding:12px 0">Scan failed — check connection and try again.</p>';
  }
  btn.disabled=false;btn.innerHTML='▶ Run Scan';
}

function toggleCard(i){
  document.getElementById('rc'+i).classList.toggle('open');
  const d=document.getElementById('rd'+i);
  d.style.display=d.style.display==='none'?'block':'none';
}

async function vetTicker(){
  const ticker=document.getElementById('vet-input').value.trim().toUpperCase();
  if(!ticker)return;
  const btn=document.getElementById('vet-btn');
  const out=document.getElementById('vet-out');
  btn.disabled=true;btn.textContent='...';
  out.innerHTML=`<p style="font-size:13px;color:#888;padding:12px 0"><span class="spinner"></span> Vetting ${ticker}...</p>`;

  const inPort=PORTFOLIO.includes(ticker);
  const portCtx=inPort?`Travis already owns ${ticker}.`:`Travis does not currently own ${ticker}.`;
  const today=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

  const prompt=`Vet this stock quickly and directly for an active swing trader named Travis.
${portCtx} Current portfolio: ${PORTFOLIO.join(', ')}.

TICKER: ${ticker}

Provide exactly this, in order:
1. What the company does (2 sentences max)
2. Current price and market cap tier (micro/small/mid/large)
3. Volume today vs 30-day average — is there a volume anomaly?
4. Most recent specific catalyst with date/dollar amount
5. Bull thesis (2 sentences)
6. Biggest risk (1 sentence)
7. Entry range | Stop loss | Price target
8. Earnings date (or N/A)
9. Backlog-to-market-cap ratio (if applicable)
10. Portfolio fit — sector overlap concern?
11. VERDICT: ACT NOW / WATCHLIST / PASS — one sentence reason

Be direct. No fluff. Today: ${today}`;

  try{
    const res=await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await res.json();
    if(data.error){
      out.innerHTML=`<p style="color:#c0392b;font-size:13px">API Error: ${data.error.message}</p>`;
    } else {
      const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');
      out.innerHTML=`<div class="output">${text}</div>`;
    }
  }catch(e){
    out.innerHTML='<p style="color:#c0392b;font-size:13px">Vet failed — check connection.</p>';
  }
  btn.disabled=false;btn.textContent='Vet It';
}

document.getElementById('vet-input').addEventListener('keydown',function(e){if(e.key==='Enter')vetTicker();});

function showTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['screener','signal'][i]===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

sync();
</script>
</body>
</html>
